<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>
            Students
        </title>
    </head>
    <body>
        <h1>Student List</h1>
        <a href="/web/students/new"> Add New Students</a>
        <br/><br/>
        <table border="1">
            <tr>
                <th>Id</th>
                <th>First Name</th>
                <th>Second Name</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
            <tr th:each="student : ${students}">
                <td th:text="${student.id}"></td>
                <td th:text="${student.firstName}"></td>
                <td th:text="${student.lastName}"></td>
                <td th:text="${student.email}"></td>
                <td>
                    <a th:href="@{/web/students/edit/{id}(id=${student.id})}">Edit</a>
                    &nbsp;
                    <a th:href="@{/web/students/delete/{id}(id=${student.id})}">Delete</a>
                </td>
            </tr>
        </table>
    </body>
</html>
