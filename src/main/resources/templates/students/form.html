<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Form</title>
</head>
<body>
    <h1 th:text="${student?.id} ? 'Edit Student' : 'Add Student'"></h1>

    <form th:action="@{/web/students/save}" th:object="${student}" method="post">
        <input type="hidden" th:field="*{id}" />

        <label>First Name:</label>
        <input type="text" th:field="*{firstName}" />
        <span th:if="${#fields.hasErrors('firstName')}"
            th:errors="*{firstName}" style="color:red"></span>

        <label>Last Name:</label>
        <input type="text" th:field="*{lastName}" />
        <span th:if="${#fields.hasErrors('lastName')}"
            th:errors="*{lastName}" style="color:red"></span>

        <label>Email:</label>
        <input type="email" th:field="*{email}" />
        <span th:if="${#fields.hasErrors('email')}"
            th:errors="*{email}" style="color:red"></span>

        <button type="submit">Save</button>
    </form>
</body>
</html>
