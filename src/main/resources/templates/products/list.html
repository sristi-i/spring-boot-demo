<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Product List</title>
</head>
<body>

    <form th:action="@{/logout}" method="post">
        <button type="submit">Logout</button>
    </form>

    <h1>Product List</h1>
    <!-- Only ADMIN sees this link -->
    <a th:href="@{/web/products/new}" sec:authorize="hasRole('ADMIN')">
        Add New Product
    </a>

    <table border="1">
        <thead>
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Quality</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.id}"></td>
                <td th:text="${product.name}"></td>
                <td th:text="${product.quality}"></td>
                <td th:text="${product.price}"></td>
                <!-- Also hide Edit and Delete for USER -->
                <td>
                    <span sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/web/products/edit/{id}(id=${product.id})}">Edit</a>
                        &nbsp;
                        <a th:href="@{/web/products/delete/{id}(id=${product.id})}">Delete</a>
                    </span>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
